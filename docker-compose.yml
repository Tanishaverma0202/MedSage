version: '3.8'

services:
  # MongoDB Service (optional - use MongoDB Atlas in production)
  mongodb:
    image: mongo:7
    container_name: medsage-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: medsage
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsage-network

  # Redis Service (for caching and job queue)
  redis:
    image: redis:7-alpine
    container_name: medsage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsage-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsage-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000

      # Database - Use MongoDB Atlas URL for production
      # Local: mongodb://admin:password@mongodb:27017/medsage?authSource=admin
      # Atlas: mongodb+srv://username:password@cluster.mongodb.net/medsage
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongodb:27017/medsage?authSource=admin}

      # Redis - Use local Redis for dev, cloud Redis for production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # AI Configuration
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}

      # Email Service
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@medsage.com}

      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-15000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-debug}

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    
    networks:
      - medsage-network

  # Frontend Service (optional - for local development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medsage-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:3000}
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - medsage-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  medsage-network:
    driver: bridge
